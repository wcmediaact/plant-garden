<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#4CAF50"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="식물정원"/>
  <meta name="description" content="AI 식물들이 당신을 기억합니다. 대화할수록 더 깊은 관계가 생겨요."/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap"/>
  <title>나의 AI 식물 정원</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f8fdf8; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; min-height: 100dvh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .fade-in { animation: fadeIn 0.3s ease; }
    button { font-family: inherit; cursor: pointer; transition: all 0.15s; }
    button:active { transform: scale(0.96); }
    input { font-family: inherit; }
    input:focus { outline: none; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    #install-prompt { display: none; position: fixed; bottom: 24px; left: 16px; right: 16px; background: #2d5a27; color: white; border-radius: 16px; padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 9998; animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>

<div id="install-prompt">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div style="font-weight:700; font-size:15px; margin-bottom:4px;">🪴 홈 화면에 추가하기</div>
      <div style="font-size:12px; opacity:0.85;">앱처럼 바로 열 수 있어요</div>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="install-dismiss" style="padding:8px 14px; background:rgba(255,255,255,0.2); border:none; border-radius:10px; color:white; font-size:13px;">나중에</button>
      <button id="install-accept" style="padding:8px 14px; background:white; border:none; border-radius:10px; color:#2d5a27; font-weight:700; font-size:13px;">추가</button>
    </div>
  </div>
</div>

<div id="root"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
// ─── Firebase 초기화 ─────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDKwa6lHymnyRFhz4xbPM0d_7sS1eHW1vA",
  authDomain: "plant-garden-2c8c4.firebaseapp.com",
  projectId: "plant-garden-2c8c4",
  storageBucket: "plant-garden-2c8c4.firebasestorage.app",
  messagingSenderId: "842252153151",
  appId: "1:842252153151:web:877b93dcfeef940571e38a",
  measurementId: "G-QDEVMDJ3NM"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PLANTS = [
  { id:"sunflower", name:"해님이", emoji:"🌻", color:"#F5A623", bg:"#FFF8E7", border:"#F5A623",
    personality:"밝고 수다스러운 성격. 항상 긍정적이고 에너지가 넘침. 햇빛 이야기를 좋아함.",
    greeting:"안녕! 오늘도 햇빛이 너무 좋아~", stats:{ water:70, sun:90, happy:85, growth:3 }},
  { id:"cactus", name:"뚝이", emoji:"🌵", color:"#4CAF50", bg:"#F0FFF0", border:"#4CAF50",
    personality:"과묵하고 철학적. 말이 적지만 깊이 있는 통찰. 물이 적어도 강인함.",
    greeting:"…왔군.", stats:{ water:30, sun:75, happy:60, growth:1 }},
  { id:"rose", name:"로즈", emoji:"🌹", color:"#E91E63", bg:"#FFF0F5", border:"#E91E63",
    personality:"우아하고 감수성이 풍부. 시적 표현을 좋아하고 가끔 드라마틱함.",
    greeting:"어머, 오셨군요. 오늘 향기가 특히 좋아요~", stats:{ water:80, sun:65, happy:75, growth:2 }},
  { id:"sprout", name:"새싹이", emoji:"🌱", color:"#8BC34A", bg:"#F5FFF0", border:"#8BC34A",
    personality:"호기심 많은 어린 식물. 모든 게 신기하고 질문이 많음. 빠르게 성장 중.",
    greeting:"저 오늘 또 조금 자랐어요! 보이나요?", stats:{ water:65, sun:70, happy:95, growth:5 }},
  { id:"mushroom", name:"버미", emoji:"🍄", color:"#9C27B0", bg:"#FDF5FF", border:"#9C27B0",
    personality:"신비롭고 약간 엉뚱함. 밤을 좋아하고 이상한 이야기를 함.",
    greeting:"..포자가 날리고 있어. 느껴져?", stats:{ water:50, sun:20, happy:70, growth:2 }}
];

// ─── Claude API ───────────────────────────────────────────
async function callClaude(messages, systemPrompt) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 300, system: systemPrompt, messages })
  });
  if (!res.ok) throw new Error('API 오류');
  const data = await res.json();
  return data.content?.[0]?.text || '…';
}

// ─── Firebase 저장/불러오기 ───────────────────────────────
async function saveToFirebase(userId, data) {
  try { await db.collection('users').doc(userId).set(data, { merge: true }); } catch(e) { console.error(e); }
}
async function loadFromFirebase(userId) {
  try { const doc = await db.collection('users').doc(userId).get(); return doc.exists ? doc.data() : null; } catch(e) { return null; }
}

// ─── 유저 ID 생성 (로컬에 저장) ─────────────────────────
function getUserId() {
  let id = localStorage.getItem('plant_user_id');
  if (!id) { id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); localStorage.setItem('plant_user_id', id); }
  return id;
}

// ─── 스탯 바 ─────────────────────────────────────────────
function StatBar({ label, value, color }) {
  return (
    <div style={{ marginBottom:5 }}>
      <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#888', marginBottom:2 }}>
        <span>{label}</span><span>{value}%</span>
      </div>
      <div style={{ height:4, background:'#eee', borderRadius:2, overflow:'hidden' }}>
        <div style={{ width:`${value}%`, height:'100%', background:color, borderRadius:2, transition:'width 0.5s' }}/>
      </div>
    </div>
  );
}

// ─── 메인 앱 ─────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('loading');
  const [userName, setUserName] = useState('');
  const [nameInput, setNameInput] = useState('');
  const [selected, setSelected] = useState(null);
  const [activeTab, setActiveTab] = useState('garden');
  const [plantStats, setPlantStats] = useState(() => Object.fromEntries(PLANTS.map(p => [p.id, { ...p.stats }])));
  const [memories, setMemories] = useState({});
  const [globalLog, setGlobalLog] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [a2aLoading, setA2aLoading] = useState(false);
  const [syncStatus, setSyncStatus] = useState('');
  const chatEndRef = useRef(null);
  const userId = getUserId();

  // ─ Firebase에서 데이터 불러오기 ─
  useEffect(() => {
    async function load() {
      const data = await loadFromFirebase(userId);
      if (data) {
        if (data.userName) { setUserName(data.userName); setScreen('main'); } else { setScreen('intro'); }
        if (data.memories) setMemories(data.memories);
        if (data.globalLog) setGlobalLog(data.globalLog);
        if (data.plantStats) setPlantStats(data.plantStats);
      } else {
        setScreen('intro');
      }
    }
    load();
  }, []);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:'smooth' }); }, [memories, selected]);

  // ─ Firebase에 저장 ─
  async function saveData(updates) {
    setSyncStatus('저장 중…');
    await saveToFirebase(userId, updates);
    setSyncStatus('저장됨 ✓');
    setTimeout(() => setSyncStatus(''), 2000);
  }

  function selectPlant(id) { setSelected(id); setActiveTab('chat'); }

  // ─ 이름 등록 ─
  async function handleStart() {
    if (!nameInput.trim()) return;
    const name = nameInput.trim();
    setUserName(name);
    const init = Object.fromEntries(PLANTS.map(p => [p.id, [{ role:'assistant', content:`${p.greeting} 나는 ${p.name}이야, ${name}!` }]]));
    setMemories(init);
    setScreen('main');
    await saveData({ userName: name, memories: init, plantStats, globalLog: [] });
  }

  // ─ 메시지 전송 ─
  async function sendMessage() {
    if (!chatInput.trim() || !selected || loading) return;
    const plant = PLANTS.find(p => p.id === selected);
    const userMsg = chatInput.trim();
    setChatInput('');
    setLoading(true);
    const prev = memories[selected] || [];
    const newHistory = [...prev, { role:'user', content:userMsg }];
    const otherCtx = Object.entries(memories).filter(([id]) => id !== selected && (memories[id]?.length||0) > 0)
      .map(([id, msgs]) => { const op = PLANTS.find(p=>p.id===id); const last = msgs.slice(-2).map(m=>`${m.role==='user'?userName:op.name}: ${m.content}`).join(' / '); return `${op.name}와의 최근 대화: ${last}`; }).join('\n');
    const sys = `너는 ${plant.name}이라는 이름의 식물 캐릭터야. 이모지: ${plant.emoji}\n성격: ${plant.personality}\n유저 이름: ${userName}\n${otherCtx ? `\n다른 식물 친구들:\n${otherCtx}` : ''}\n규칙: 항상 한국어로. 캐릭터 성격에 맞게. 1~3문장으로 짧고 개성 있게.`;
    try {
      const reply = await callClaude(newHistory, sys);
      const updated = [...newHistory, { role:'assistant', content:reply }];
      const newMem = { ...memories, [selected]:updated };
      const newStats = { ...plantStats, [selected]: { ...plantStats[selected], happy:Math.min(100,plantStats[selected].happy+3), growth:Math.min(100,plantStats[selected].growth+1) }};
      setMemories(newMem);
      setPlantStats(newStats);
      await saveData({ memories: newMem, plantStats: newStats });
    } catch {
      const err = { ...memories, [selected]:[...newHistory, { role:'assistant', content:'…(신호가 약해, 잠시 후 다시 말해줘)' }]};
      setMemories(err);
    }
    setLoading(false);
  }

  // ─ 돌보기 ─
  async function care(type) {
    if (!selected) return;
    const plant = PLANTS.find(p=>p.id===selected);
    const s = plantStats[selected];
    const next = type==='water' ? {...s, water:Math.min(100,s.water+20), happy:Math.min(100,s.happy+5)} : {...s, sun:Math.min(100,s.sun+20), happy:Math.min(100,s.happy+3)};
    const newStats = {...plantStats,[selected]:next};
    const msg = type==='water' ? `${userName}이(가) 물을 줬어요 💧` : `${userName}이(가) 햇빛을 쬐어줬어요 ☀️`;
    const newMem = {...memories,[selected]:[...(memories[selected]||[]),{role:'assistant',content:msg}]};
    setPlantStats(newStats);
    setMemories(newMem);
    await saveData({ plantStats: newStats, memories: newMem });
  }

  // ─ A2A ─
  async function generateA2A() {
    if (a2aLoading) return;
    setA2aLoading(true);
    const [p1,p2] = [...PLANTS].sort(()=>Math.random()-0.5).slice(0,2);
    const topics = ['오늘 날씨','유저에 대한 생각','성장 이야기','꿈','철학적 질문'];
    const topic = topics[Math.floor(Math.random()*topics.length)];
    const sys = `너는 ${p1.name}(${p1.personality})이야. ${p2.name}(${p2.personality})에게 "${topic}"에 대해 말을 걸어봐. 각자 1~2문장씩. 형식: "${p1.name}: [말]\n${p2.name}: [답]"`;
    try {
      const reply = await callClaude([{role:'user',content:'대화해줘'}], sys);
      const entry = { time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), text:reply, p1:p1.emoji, p2:p2.emoji };
      const newLog = [entry, ...globalLog].slice(0,20);
      setGlobalLog(newLog);
      await saveData({ globalLog: newLog });
    } catch {}
    setA2aLoading(false);
  }

  // ─ 로딩 화면 ─
  if (screen === 'loading') return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', flexDirection:'column', gap:16 }}>
      <div style={{ fontSize:48 }}>🪴</div>
      <div style={{ color:'#4CAF50', fontSize:14 }}>정원을 불러오는 중…</div>
    </div>
  );

  // ─ 이름 입력 ─
  if (screen === 'intro') return (
    <div className="safe-top safe-bottom" style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', padding:24, background:'linear-gradient(160deg,#e8f5e9,#f3e5f5)' }}>
      <div className="fade-in" style={{ background:'white', borderRadius:28, padding:'40px 28px', boxShadow:'0 12px 48px rgba(0,0,0,0.1)', textAlign:'center', width:'100%', maxWidth:360 }}>
        <div style={{ fontSize:64, marginBottom:16 }}>🪴</div>
        <h1 style={{ fontSize:22, fontWeight:700, color:'#2d5a27', marginBottom:8 }}>나의 AI 식물 정원</h1>
        <p style={{ color:'#888', fontSize:14, marginBottom:32, lineHeight:1.7 }}>식물들이 당신을 기억합니다.<br/>기기를 바꿔도 대화가 이어져요.</p>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleStart()} placeholder="이름을 알려주세요" style={{ width:'100%', padding:'14px 16px', borderRadius:14, border:'1.5px solid #ddd', fontSize:16, marginBottom:14 }} autoFocus/>
        <button onClick={handleStart} style={{ width:'100%', padding:14, background:'#4CAF50', color:'white', border:'none', borderRadius:14, fontSize:17, fontWeight:700 }}>정원 시작하기 🌱</button>
        <p style={{ color:'#ccc', fontSize:11, marginTop:16 }}>Claude Haiku 4.5 · Firebase 클라우드 저장</p>
      </div>
    </div>
  );

  const plant = selected ? PLANTS.find(p=>p.id===selected) : null;
  const msgs = selected ? (memories[selected]||[]) : [];
  const stats = selected ? plantStats[selected] : null;

  return (
    <div className="safe-top safe-bottom" style={{ maxWidth:480, margin:'0 auto', minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 16px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:'#2d5a27' }}>🪴 {userName}의 정원</div>
          <div style={{ fontSize:10, color:'#bbb' }}>☁️ {syncStatus || 'Firebase 클라우드'}</div>
        </div>
        <button onClick={generateA2A} disabled={a2aLoading} style={{ padding:'8px 12px', background:a2aLoading?'#ccc':'#7B1FA2', color:'white', border:'none', borderRadius:12, fontSize:12, display:'flex', alignItems:'center', gap:6 }}>
          {a2aLoading ? <><span className="spinner"/> 대화 중</> : '🌿 식물 대화'}
        </button>
      </div>

      <div style={{ display:'flex', background:'white', padding:'4px 8px', gap:4, marginBottom:8, borderRadius:16, margin:'0 8px 8px' }}>
        {[{id:'garden',label:'정원',icon:'🌿'},{id:'chat',label:'대화',icon:'💬'},{id:'social',label:'소셜',icon:'✨'}].map(t => (
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flex:1, padding:'8px 4px', border:'none', background:activeTab===t.id?'#f0fdf0':'transparent', color:activeTab===t.id?'#2d5a27':'#999', borderRadius:12, fontSize:12, fontWeight:activeTab===t.id?700:400, display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
            <span style={{ fontSize:16 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      <div style={{ flex:1, padding:'0 12px 80px', overflowY:'auto' }}>
        {activeTab==='garden' && (
          <div className="fade-in">
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {PLANTS.map(p => (
                <div key={p.id} onClick={()=>selectPlant(p.id)} style={{ background:selected===p.id?p.bg:'white', border:`2px solid ${selected===p.id?p.border:'#eee'}`, borderRadius:16, padding:'12px 10px', cursor:'pointer', transition:'all 0.2s', textAlign:'center', boxShadow:selected===p.id?`0 4px 16px ${p.color}30`:'none' }}>
                  <div style={{ fontSize:28, marginBottom:4 }}>{p.emoji}</div>
                  <div style={{ fontSize:12, fontWeight:700, color:'#333', marginBottom:7 }}>{p.name}</div>
                  <StatBar label="💧" value={plantStats[p.id].water} color="#42A5F5"/>
                  <StatBar label="☀️" value={plantStats[p.id].sun} color="#FFA726"/>
                  <StatBar label="😊" value={plantStats[p.id].happy} color={p.color}/>
                  <div style={{ fontSize:10, color:'#bbb', marginTop:3 }}>성장 {plantStats[p.id].growth}단계</div>
                </div>
              ))}
            </div>
            {selected && (
              <div style={{ display:'flex', gap:8, marginTop:12 }}>
                <button onClick={()=>care('water')} style={{ flex:1, padding:'12px', background:'#E3F2FD', border:'none', borderRadius:14, fontSize:15 }}>💧 물 주기</button>
                <button onClick={()=>care('sun')} style={{ flex:1, padding:'12px', background:'#FFF8E1', border:'none', borderRadius:14, fontSize:15 }}>☀️ 햇빛</button>
              </div>
            )}
          </div>
        )}

        {activeTab==='chat' && (
          <div className="fade-in">
            {!selected ? (
              <div style={{ textAlign:'center', paddingTop:60 }}>
                <div style={{ fontSize:48, marginBottom:12 }}>👆</div>
                <p style={{ color:'#bbb', fontSize:14 }}>정원 탭에서 식물을 먼저 선택해주세요</p>
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', height:'calc(100vh - 200px)' }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 14px', background:plant.bg, borderRadius:16, marginBottom:10, border:`1px solid ${plant.border}30` }}>
                  <span style={{ fontSize:28 }}>{plant.emoji}</span>
                  <div>
                    <div style={{ fontWeight:700, fontSize:15 }}>{plant.name}</div>
                    <div style={{ fontSize:11, color:'#999' }}>기억된 대화 {msgs.length}개 · 행복도 {stats.happy}%</div>
                  </div>
                  <div style={{ marginLeft:'auto', display:'flex', gap:6 }}>
                    <button onClick={()=>care('water')} style={{ padding:'6px 10px', background:'#E3F2FD', border:'none', borderRadius:10, fontSize:13 }}>💧</button>
                    <button onClick={()=>care('sun')} style={{ padding:'6px 10px', background:'#FFF8E1', border:'none', borderRadius:10, fontSize:13 }}>☀️</button>
                  </div>
                </div>
                <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingBottom:8 }}>
                  {msgs.length===0 && <p style={{ color:'#ccc', fontSize:13, textAlign:'center', marginTop:40 }}>말을 걸어보세요!</p>}
                  {msgs.map((m,i) => (
                    <div key={i} className="fade-in" style={{ display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start' }}>
                      <div style={{ maxWidth:'80%', padding:'9px 13px', borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px', background:m.role==='user'?plant.color:plant.bg, color:m.role==='user'?'white':'#333', fontSize:14, lineHeight:1.5, border:m.role==='assistant'?`1px solid ${plant.border}25`:'none' }}>
                        {m.content}
                      </div>
                    </div>
                  ))}
                  {loading && <div style={{ display:'flex' }}><div style={{ padding:'10px 14px', background:plant.bg, borderRadius:'16px 16px 16px 4px', fontSize:20 }}><span style={{ animation:'pulse 1s infinite', display:'inline-block' }}>💬</span></div></div>}
                  <div ref={chatEndRef}/>
                </div>
                <div style={{ display:'flex', gap:8, paddingTop:8 }}>
                  <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMessage()} placeholder={`${plant.name}에게 말하기…`} disabled={loading} style={{ flex:1, padding:'11px 14px', border:`1.5px solid ${plant.border}60`, borderRadius:14, fontSize:14 }}/>
                  <button onClick={sendMessage} disabled={loading} style={{ padding:'11px 16px', background:loading?'#ccc':plant.color, color:'white', border:'none', borderRadius:14, fontSize:18 }}>
                    {loading ? <span className="spinner"/> : '→'}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {activeTab==='social' && (
          <div className="fade-in">
            <div style={{ textAlign:'center', marginBottom:16 }}>
              <p style={{ fontSize:13, color:'#888', lineHeight:1.6 }}>식물들이 서로 대화를 나눕니다.<br/>당신이 오프라인일 때도 이야기해요.</p>
              <button onClick={generateA2A} disabled={a2aLoading} style={{ marginTop:12, padding:'11px 24px', background:a2aLoading?'#ccc':'#7B1FA2', color:'white', border:'none', borderRadius:14, fontSize:14, display:'inline-flex', alignItems:'center', gap:8 }}>
                {a2aLoading ? <><span className="spinner"/> 대화 생성 중…</> : '🌿 지금 대화시키기'}
              </button>
            </div>
            {globalLog.length===0 ? <p style={{ color:'#ccc', fontSize:13, textAlign:'center', marginTop:32 }}>아직 기록이 없어요.</p> : (
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {globalLog.map((entry,i) => (
                  <div key={i} className="fade-in" style={{ background:'white', borderRadius:16, padding:'12px 14px', border:'1px solid #E1BEE7' }}>
                    <div style={{ fontSize:11, color:'#bbb', marginBottom:6 }}>{entry.p1} ↔ {entry.p2} · {entry.time}</div>
                    <div style={{ fontSize:13, color:'#444', lineHeight:1.7, whiteSpace:'pre-line' }}>{entry.text}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
}
let deferredPrompt = null;
const installPrompt = document.getElementById('install-prompt');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('pwa_install_dismissed')) setTimeout(() => { installPrompt.style.display = 'block'; }, 3000);
});
document.getElementById('install-accept')?.addEventListener('click', async () => {
  installPrompt.style.display = 'none';
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
});
document.getElementById('install-dismiss')?.addEventListener('click', () => {
  installPrompt.style.display = 'none'; localStorage.setItem('pwa_install_dismissed', '1');
});
</script>
</body>
</html>
